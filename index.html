<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的股票看板</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header class="page-header">
      <h1>我的股票看板</h1>
      <div class="controls">
        <label>股票代號</label>
        <input id="symbols-input" type="text" placeholder="2330">
        <button id="update-button">立即新增</button>
      </div>
    </header>

    <div id="pagination-controls" class="panel pagination-bar">
      <div class="pagination-group pagination-nav">
        <button id="prev-page-btn" class="btn-secondary pagination-button" disabled>上一頁</button>
        <span id="page-info" class="page-info">第 1 頁 / 共 1 頁</span>
        <button id="next-page-btn" class="btn-secondary pagination-button" disabled>下一頁</button>
      </div>
      <div class="pagination-group pagination-size">
        <label for="items-per-page" class="pagination-label">每頁顯示:</label>
        <select id="items-per-page" class="select-control">
          <option value="10" selected>10 筆</option>
          <option value="15">15 筆</option>
          <option value="20">20 筆</option>
          <option value="25">25 筆</option>
          <option value="30">30 筆</option>
        </select>
      </div>
    </div>

    <section class="table-section">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>股票</th>
              <th>中文名稱</th>
              <th>最新價</th>
              <th>漲跌</th>
              <th>漲跌幅</th>
              <th>成交量</th>
              <th>成本價</th>
              <th>報酬率</th>
              <th>現存股數</th>
              <th>損益</th>
              <th>我的記錄</th>
            </tr>
          </thead>
          <tbody id="stock-table-body"></tbody>
        </table>
      </div>
      <div id="stock-card-list" class="stock-card-list"></div>
    </section>

    <footer class="page-footer">
      <div class="footer-meta">
        <div class="footer-inline-group footer-interval-group">
          <p class="footer-text">自動更新頻率：<span id="refresh-interval">12 秒</span></p>
          <button id="refresh-now-button" class="btn-secondary action-button" title="立即更新目前清單">現在更新</button>
          <button class="interval-btn btn-secondary interval-button" data-ms="6000">6秒</button>
          <button class="interval-btn btn-secondary interval-button" data-ms="12000">12秒</button>
          <button class="interval-btn btn-secondary interval-button" data-ms="30000">30秒</button>
        </div>
        <p class="footer-text footer-last-updated">最後更新：<span id="last-updated">尚未更新</span></p>
      </div>
      <div class="footer-actions">
        <div class="footer-inline-group footer-action-row">
          <button id="settings-button" class="btn-secondary action-button" title="設定 API Key">🔑 API Key</button>
          <button id="github-sync-button" class="btn-secondary action-button icon-button" title="GitHub Gist 雲端同步">
            <svg class="button-icon" height="12" width="12" viewBox="0 0 16 16">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
              </path>
            </svg>
            GitHub
          </button>
          <button id="export-button" class="btn-secondary action-button" title="儲存清單與備註">📤 上傳</button>
          <button id="import-button" class="btn-secondary action-button" title="匯入清單與備註">📥 下載</button>
        </div>
        <div class="footer-source-row">
          <p class="footer-text">即時報價來源：Fugle Market Data API</p>
          <input type="file" id="import-file-input" class="hidden-input" accept=".json">
        </div>
      </div>
    </footer>
  </div>

  <div id="api-key-modal" class="modal-overlay is-hidden">
    <div class="modal-content">
      <h2>設定 Fugle API Key</h2>
      <p class="modal-description">請輸入您的 API 密鑰，將安全儲存於瀏覽器中。</p>
      <input id="modal-api-key-input" type="text" placeholder="在此貼上 API Key">
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-ok">確認</button>
      </div>
    </div>
  </div>

  <div id="github-sync-modal" class="modal-overlay is-hidden">
    <div class="modal-content">
      <h2>GitHub Gist 雲端同步</h2>
      <p class="modal-description">請輸入具備 gist 權限的 PAT。若留空 Gist ID，上傳時將自動建立新 Gist。</p>
      <label for="modal-github-token-input" class="modal-label">GitHub PAT 金鑰</label>
      <input id="modal-github-token-input" class="modal-input-compact" type="password" placeholder="ghp_...">
      <label for="modal-github-gist-id-input" class="modal-label modal-label-spaced">Gist ID</label>
      <input id="modal-github-gist-id-input" class="modal-input-compact" type="text" placeholder="留空則上傳自動建立">
      <label for="modal-github-record-time" class="modal-label modal-label-spaced">資料日期</label>
      <input id="modal-github-record-time" class="modal-input-compact modal-input-readonly" type="text" readonly placeholder="尚未同步">
      <div class="modal-actions modal-actions-split">
        <button id="modal-github-cancel" class="btn-secondary">關閉</button>
        <div class="modal-action-group">
          <button id="modal-github-download" class="btn-secondary modal-download-button" title="從 Gist 下載並覆蓋本地">☁️ 下載</button>
          <button id="modal-github-upload" class="modal-upload-button" title="將本地資料上傳至 Gist">☁️ 上傳</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
